[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "16.20.0"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "https://tldr.aun.sh/*"
  to = "/tldr"
  status = 200
  force  = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404